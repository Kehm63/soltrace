<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SolTrace — Wallet Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0b10;
      --surface: #13131a;
      --border: #1f1f30;
      --border2: #2a2a40;
      --accent: #7c6dfa;
      --accent2: #a78bfa;
      --green: #22c55e;
      --red: #ef4444;
      --text: #e2e2f0;
      --muted: #5a5a80;
      --mono: 'Space Mono', monospace;
      --display: 'Syne', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      min-height: 100vh;
    }

    /* background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .page { position: relative; z-index: 1; max-width: 740px; margin: 0 auto; padding: 48px 20px 80px; }

    /* header */
    .header { text-align: center; margin-bottom: 48px; }
    .badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent2);
      border: 1px solid #3d3560;
      border-radius: 20px;
      padding: 4px 14px;
      margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(48px, 10vw, 80px);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 14px;
    }
    h1 span { color: var(--accent); }
    .subtitle { color: var(--muted); font-size: 15px; line-height: 1.7; max-width: 440px; margin: 0 auto; font-weight: 400; }

    /* cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* inputs */
    .mint-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .mint-num { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 24px; flex-shrink: 0; }
    .mint-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 12px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .mint-input:focus { border-color: var(--accent); }
    .mint-input.invalid { border-color: var(--red); }
    .remove-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .remove-btn:hover { border-color: var(--red); color: var(--red); }

    /* buttons */
    .btn-row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
    .add-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--display);
      font-size: 13px;
      padding: 9px 18px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .find-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-family: var(--display);
      font-size: 14px;
      font-weight: 700;
      padding: 10px 28px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }
    .find-btn:hover { background: var(--accent2); }
    .find-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* progress */
    .progress-wrap { margin: 8px 0 16px; display: none; }
    .progress-bar { height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 10px; }
    .progress-fill { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }
    .progress-text { font-family: var(--mono); font-size: 11px; color: var(--muted); text-align: center; }

    /* error */
    .error-box {
      background: #1a0a0a;
      border: 1px solid #4a1010;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--red);
      margin-bottom: 16px;
      display: none;
    }

    /* stats */
    .stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
    .stat {
      flex: 1;
      min-width: 130px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .stat.match {
      border-color: #2d4a2d;
      background: #0d1a0d;
    }
    .stat-label { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.12em; margin-bottom: 6px; }
    .stat-mint { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .stat-val { font-size: 24px; font-weight: 700; }
    .stat-val.big { font-size: 36px; color: var(--green); }

    /* results */
    .results-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 16px; display: none; }
    .results-head { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .copy-all {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--accent2);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 5px 14px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .copy-all:hover { background: #1a1830; }
    .wallet-list { max-height: 400px; overflow-y: auto; }
    .wallet-row { display: flex; align-items: center; gap: 12px; padding: 10px 18px; border-bottom: 1px solid #0f0f1a; transition: background 0.1s; }
    .wallet-row:last-child { border-bottom: none; }
    .wallet-row:hover { background: #0f0f18; }
    .w-num { font-family: var(--mono); font-size: 10px; color: var(--muted); width: 30px; flex-shrink: 0; }
    .w-addr {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-decoration: none;
      transition: color 0.15s;
    }
    .w-addr:hover { color: var(--accent2); }
    .w-copy {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .w-copy:hover { border-color: var(--accent); color: var(--accent); }
    .empty { text-align: center; padding: 48px 20px; color: var(--muted); font-size: 14px; line-height: 1.8; }

    footer { text-align: center; margin-top: 56px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
    footer a { color: var(--accent2); text-decoration: none; }

    /* scrollbar */
    .wallet-list::-webkit-scrollbar { width: 4px; }
    .wallet-list::-webkit-scrollbar-track { background: transparent; }
    .wallet-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>
<div class="page">

  <header class="header">
    <div class="badge">SOLANA ON-CHAIN TOOL</div>
    <h1>SOL<span>TRACE</span></h1>
    <p class="subtitle">Paste up to 5 token mint addresses. Get back every wallet that holds or traded all of them.</p>
  </header>

  <div class="card">
    <div class="card-header">
      <span class="label">Token mint addresses</span>
      <span class="label" id="mintCount">3 / 5</span>
    </div>
    <div id="mintRows"></div>
    <div class="btn-row">
      <button class="add-btn" id="addBtn" onclick="addMint()">+ Add token</button>
      <button class="find-btn" id="findBtn" onclick="findWallets()" disabled>Find wallets →</button>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText">Fetching on-chain data…</div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div id="statsRow" class="stats-row" style="display:none"></div>
  <div class="results-card" id="resultsCard">
    <div class="results-head">
      <span class="label" id="resultsLabel">Wallets found</span>
      <button class="copy-all" id="copyAllBtn" onclick="copyAll()">Copy all</button>
    </div>
    <div class="wallet-list" id="walletList"></div>
  </div>

  <footer>Powered by <a href="https://helius.dev" target="_blank">Helius</a> · Solana mainnet</footer>
</div>

<script>
  const SOLANA_RE = /^[1-9A-HJ-NP-Za-km-z]{32,44}$/;
  let mints = ['', '', ''];
  let lastWallets = [];

  function shorten(a) { return a.slice(0,4)+'...'+a.slice(-4); }

  function renderMints() {
    const c = document.getElementById('mintRows');
    c.innerHTML = '';
    mints.forEach((v, i) => {
      const bad = v.trim().length > 0 && !SOLANA_RE.test(v.trim());
      const row = document.createElement('div');
      row.className = 'mint-row';
      row.innerHTML = `
        <span class="mint-num">#${i+1}</span>
        <input class="mint-input${bad?' invalid':''}" value="${v}"
          placeholder="Mint address…" spellcheck="false" autocomplete="off"
          oninput="onMintInput(${i},this)" />
        ${mints.length>1?`<button class="remove-btn" onclick="removeMint(${i})">✕</button>`:''}
      `;
      c.appendChild(row);
    });
    document.getElementById('mintCount').textContent = `${mints.filter(m=>m.trim()).length} / 5`;
    document.getElementById('addBtn').style.display = mints.length >= 5 ? 'none' : '';
    updateBtn();
  }

  function onMintInput(i, el) {
    mints[i] = el.value;
    const bad = el.value.trim().length > 0 && !SOLANA_RE.test(el.value.trim());
    el.className = 'mint-input' + (bad ? ' invalid' : '');
    document.getElementById('mintCount').textContent = `${mints.filter(m=>m.trim()).length} / 5`;
    updateBtn();
  }

  function addMint() { if (mints.length < 5) { mints.push(''); renderMints(); } }
  function removeMint(i) { mints.splice(i,1); renderMints(); }

  function updateBtn() {
    const active = mints.filter(m=>m.trim());
    const bad = active.filter(m=>!SOLANA_RE.test(m.trim()));
    document.getElementById('findBtn').disabled = !(active.length >= 1 && bad.length === 0);
  }

  function progress(pct, text) {
    document.getElementById('progressFill').style.width = pct + '%';
    if (text) document.getElementById('progressText').textContent = text;
  }

  async function findWallets() {
    const active = mints.filter(m=>m.trim());
    document.getElementById('errorBox').style.display = 'none';
    document.getElementById('statsRow').style.display = 'none';
    document.getElementById('resultsCard').style.display = 'none';
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('findBtn').disabled = true;
    progress(10, 'Sending request to server…');

    try {
      progress(30, `Scanning ${active.length} token${active.length>1?'s':''}…`);
      const res = await fetch('/api/find-wallets', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mints: active })
      });
      progress(80, 'Computing intersection…');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      progress(100, 'Done!');
      setTimeout(() => {
        document.getElementById('progressWrap').style.display = 'none';
        renderResults(data);
        updateBtn();
      }, 400);
    } catch(e) {
      document.getElementById('progressWrap').style.display = 'none';
      progress(0);
      const eb = document.getElementById('errorBox');
      eb.textContent = '⚠ ' + (e.message || 'Unknown error');
      eb.style.display = 'block';
      updateBtn();
    }
  }

  function renderResults(data) {
    const sr = document.getElementById('statsRow');
    sr.innerHTML = data.stats.map((s,i) => `
      <div class="stat">
        <div class="stat-label">Token #${i+1}</div>
        <div class="stat-mint">${shorten(s.mint)}</div>
        <div class="stat-val">${s.count.toLocaleString()}</div>
      </div>
    `).join('') + `
      <div class="stat match">
        <div class="stat-label">Intersection</div>
        <div class="stat-mint">matching wallets</div>
        <div class="stat-val big">${data.matchCount.toLocaleString()}</div>
      </div>
    `;
    sr.style.display = 'flex';

    lastWallets = data.wallets;
    document.getElementById('resultsLabel').textContent = `Wallets found (${data.matchCount})`;
    document.getElementById('copyAllBtn').style.display = data.wallets.length ? '' : 'none';

    const list = document.getElementById('walletList');
    if (!data.wallets.length) {
      list.innerHTML = `<div class="empty">No wallets found across all tokens.<br>Try fewer tokens or check your mint addresses.</div>`;
    } else {
      list.innerHTML = data.wallets.map((addr, i) => `
        <div class="wallet-row">
          <span class="w-num">${String(i+1).padStart(3,'0')}</span>
          <a class="w-addr" href="https://solscan.io/account/${addr}" target="_blank" rel="noopener">${addr}</a>
          <button class="w-copy" id="wc${i}" onclick="copyOne('${addr}',${i})">Copy</button>
        </div>
      `).join('');
    }
    document.getElementById('resultsCard').style.display = 'block';
  }

  function copyOne(addr, i) {
    navigator.clipboard.writeText(addr).catch(()=>{});
    const b = document.getElementById('wc'+i);
    if (b) { b.textContent = '✓'; setTimeout(()=>{ b.textContent='Copy'; }, 1500); }
  }

  function copyAll() {
    navigator.clipboard.writeText(lastWallets.join('\n')).catch(()=>{});
    const b = document.getElementById('copyAllBtn');
    b.textContent = '✓ Copied!';
    setTimeout(()=>{ b.textContent='Copy all'; }, 1800);
  }

  renderMints();
</script>
</body>
</html>
